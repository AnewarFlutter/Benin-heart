openapi: 3.0.3
info:
  title: Shoemaker API
  version: 1.0.0
  description: API de gestion de réparation de chaussures avec système de livraison
paths:
  /api/admin/codes-collecte/:
    get:
      operationId: admin_codes_collecte_list
      description: Récupère la liste des codes (filtrables par statut utilise)
      summary: Liste des codes de collecte
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - ADMIN - Codes Collecte
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCodeCollecteList'
          description: ''
  /api/admin/codes-collecte/{id}/:
    get:
      operationId: admin_codes_collecte_retrieve
      description: Récupère les détails d'un code de collecte
      summary: Détails d'un code
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Code de collecte.
        required: true
      tags:
      - ADMIN - Codes Collecte
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeCollecte'
          description: ''
    delete:
      operationId: admin_codes_collecte_destroy
      description: Supprimer un code de collecte (uniquement si non utilisé)
      summary: Supprimer un code
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Code de collecte.
        required: true
      tags:
      - ADMIN - Codes Collecte
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/admin/codes-collecte/download/:
    get:
      operationId: admin_codes_collecte_download_retrieve
      description: Télécharge un fichier texte avec tous les codes disponibles
      summary: Télécharger les codes disponibles
      tags:
      - ADMIN - Codes Collecte
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeCollecte'
          description: ''
  /api/admin/codes-collecte/statistics/:
    get:
      operationId: admin_codes_collecte_statistics_retrieve
      description: Récupère les statistiques des codes de collecte
      summary: Statistiques des codes
      tags:
      - ADMIN - Codes Collecte
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeCollecte'
          description: ''
  /api/admin/codes-promo/:
    get:
      operationId: admin_codes_promo_list
      description: Récupère la liste de tous les codes promo
      summary: Liste des codes promo
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - ADMIN - Code promo
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminCodePromoList'
          description: ''
    post:
      operationId: admin_codes_promo_create
      description: Créer un nouveau code promo
      summary: Créer un code promo
      tags:
      - ADMIN - Code promo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCodePromoRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminCodePromoRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminCodePromoRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCodePromo'
          description: ''
  /api/admin/codes-promo/{id}/:
    get:
      operationId: admin_codes_promo_retrieve
      description: Récupère les détails d'un code promo spécifique
      summary: Détails d'un code promo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Code promo.
        required: true
      tags:
      - ADMIN - Code promo
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCodePromo'
          description: ''
    put:
      operationId: admin_codes_promo_update
      description: Modifier un code promo existant
      summary: Modifier un code promo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Code promo.
        required: true
      tags:
      - ADMIN - Code promo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCodePromoRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminCodePromoRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminCodePromoRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCodePromo'
          description: ''
    delete:
      operationId: admin_codes_promo_destroy
      description: Supprimer un code promo
      summary: Supprimer un code promo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Code promo.
        required: true
      tags:
      - ADMIN - Code promo
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/admin/commandes/:
    get:
      operationId: admin_commandes_list
      description: 'Récupère la liste de toutes les commandes (filtres: statut_paiement,
        statut_commande, user_id)'
      summary: Liste des commandes
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - ADMIN - Commande
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminCommandeListList'
          description: ''
  /api/admin/commandes/{id}/:
    get:
      operationId: admin_commandes_retrieve
      description: Récupère les détails complets d'une commande
      summary: Détails d'une commande
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Commande.
        required: true
      tags:
      - ADMIN - Commande
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCommande'
          description: ''
    put:
      operationId: admin_commandes_update
      description: Modifier les informations d'une commande existante
      summary: Modifier une commande
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Commande.
        required: true
      tags:
      - ADMIN - Commande
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCommandeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminCommandeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminCommandeRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCommande'
          description: ''
    delete:
      operationId: admin_commandes_destroy
      description: Supprimer définitivement une commande
      summary: Supprimer une commande
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Commande.
        required: true
      tags:
      - ADMIN - Commande
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/admin/commandes/{id}/assign-delivery-livraison/:
    post:
      operationId: admin_commandes_assign_delivery_livraison_create
      description: Assigne un livreur disponible pour la livraison finale d'une commande
        réparée. Le livreur recevra une notification par email avec la date de livraison
        prévue. La commande doit être au statut 'prête' pour pouvoir être assignée.
      summary: Assigner un livreur pour la livraison finale
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Commande.
        required: true
      tags:
      - ADMIN - Livraison Finale
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDeliveryPersonLivraisonRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignDeliveryPersonLivraisonRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignDeliveryPersonLivraisonRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCommande'
          description: ''
  /api/admin/commandes/{id}/assign_delivery_person/:
    post:
      operationId: admin_commandes_assign_delivery_person_create
      description: Assigne un livreur disponible pour collecter les chaussures chez
        le client. Le livreur recevra une notification par email avec les détails
        de la collecte.
      summary: Assigner un livreur pour la collecte
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Commande.
        required: true
      tags:
      - ADMIN - Collecte
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDeliveryPersonRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignDeliveryPersonRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignDeliveryPersonRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCommande'
          description: ''
  /api/admin/commandes/{id}/update_status/:
    post:
      operationId: admin_commandes_update_status_create
      description: Modifier le statut de paiement et/ou le statut de la commande
      summary: Changer le statut d'une commande
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Commande.
        required: true
      tags:
      - ADMIN - Commande
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatutRequest'
          multipart/form-data:
            schema:
