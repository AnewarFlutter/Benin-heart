      summary: Liste des livreurs
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Admin - Gestion des livreurs
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
