          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdateStatutRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCommande'
          description: ''
  /api/admin/commandes/checkout/:
    post:
      operationId: admin_commandes_checkout_create
      description: 'Créer une nouvelle commande pour un utilisateur spécifique (ex:
        commande téléphonique)'
      summary: Créer une commande pour un client (checkout admin)
      tags:
      - ADMIN - CREATION Commande
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCheckoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminCheckoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminCheckoutRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCheckout'
          description: ''
  /api/admin/commandes/statistics/:
    get:
      operationId: admin_commandes_statistics_retrieve
      description: Récupère les statistiques globales des commandes
      summary: Statistiques des commandes
      tags:
      - ADMIN - Commande
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCommande'
          description: ''
  /api/admin/contacts/:
    get:
      operationId: admin_contacts_list
      description: Récupère la liste de tous les messages de contact reçus (réservé
        aux administrateurs).
      summary: Lister tous les messages de contact
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Admin - Contact
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminContactList'
          description: ''
  /api/admin/contacts/{id}/:
    get:
      operationId: admin_contacts_retrieve
      description: Récupère les détails complets d'un message de contact spécifique
