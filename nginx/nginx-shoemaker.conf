# ============================================================================
# NGINX CONFIGURATION PRODUCTION - SHOEMAKER
# ============================================================================
#
# Domaines configurés :
# - allocireur.com        → Frontend Client
# - admin.allocireur.com  → Frontend Admin
# - api.allocireur.com    → Backend Django
#
# ============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================
    # LOGS
    # ========================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ========================================
    # PERFORMANCE
    # ========================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ========================================
    # RATE LIMITING
    # ========================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api_strict:10m rate=5r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ========================================
    # UPSTREAMS
    # ========================================
    upstream frontend_shoemaker {
        least_conn;
        server shoemaker-frontend-prod:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend_shoemaker_admin {
        least_conn;
        server shoemaker-admin-frontend-prod:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream shoemaker_backend {
        server shoemaker_web_prod:8000;  
        keepalive 32;
    }

    # ========================================
    # REDIRECTION HTTP → HTTPS
    # ========================================
    server {
        listen 80;
        listen [::]:80;
        server_name allocireur.com
                    admin.allocireur.com
                    api.allocireur.com;
   
        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Rediriger tout le reste vers HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================
    # FRONTEND SHOEMAKER CLIENT
    # ========================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name allocireur.com;

        # ========================================
        # CERTIFICATS SSL
        # ========================================
        ssl_certificate /etc/letsencrypt/live/allocireur.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/allocireur.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/allocireur.com/chain.pem;

        # ========================================
        # CONFIGURATION SSL/TLS
        # ========================================
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ========================================
        # HEADERS DE SÉCURITÉ
        # ========================================
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ========================================
        # LOGS
        # ========================================
        access_log /var/log/nginx/shoemaker-access.log main;
        error_log /var/log/nginx/shoemaker-error.log warn;

        # ========================================
        # PROXY VERS FRONTEND
        # ========================================
        location / {
            proxy_pass http://frontend_shoemaker;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }

    # ========================================
    # FRONTEND SHOEMAKER ADMIN
    # ========================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name admin.allocireur.com;

        # SSL (certificat commun)
        ssl_certificate /etc/letsencrypt/live/allocireur.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/allocireur.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/allocireur.com/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Headers de sécurité
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Logs
        access_log /var/log/nginx/shoemaker-admin-access.log main;
        error_log /var/log/nginx/shoemaker-admin-error.log warn;

        # Proxy
        location / {
            proxy_pass http://frontend_shoemaker_admin;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ========================================
    # BACKEND DJANGO API
    # ========================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.allocireur.com;

        # CERTIFICATS SSL (certificat commun)
        ssl_certificate /etc/letsencrypt/live/allocireur.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/allocireur.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/allocireur.com/chain.pem;

        # CONFIGURATION SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;

        # Headers de sécurité
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # LOGS
        access_log /var/log/nginx/shoemaker-api-access.log main;
        error_log /var/log/nginx/shoemaker-api-error.log warn;

        # ========================================
        # CORS (si nécessaire)
        # ========================================
        set $cors_origin "";
        
        if ($http_origin ~* (https://allocireur\.com|https://admin\.allocireur\.com)) {
            set $cors_origin $http_origin;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRF-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ========================================
        # STATIC FILES (Django Admin & DRF)
        # ========================================
        location /static/ {
            alias /var/www/shoemaker/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ========================================
        # MEDIA FILES
        # ========================================
        location /media/ {
            alias /var/www/shoemaker/media/;
            expires 7d;
        }

        # ========================================
        # PROXY VERS LE BACKEND
        # ========================================
        location / {
            # Rate limiting pour l'API
            limit_req zone=api_limit burst=40 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://shoemaker_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Pour les connexions keepalive
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}