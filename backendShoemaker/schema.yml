components:
  schemas:
    ActionEnum:
      enum:
      - add
      - remove
      - set
      type: string
      description: |-
        * `add` - add
        * `remove` - remove
        * `set` - set
    ActivateDeactivateUserRequest:
      type: object
      description: Serializer for activating/deactivating user account.
      properties:
        is_active:
          type: boolean
          description: True pour activer, False pour désactiver
      required:
      - is_active
    AdminChangePasswordRequest:
      type: object
      description: Serializer for admin changing user password (with current password
        check).
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
          description: Mot de passe actuel de l'utilisateur
        new_password:
          type: string
          writeOnly: true
          minLength: 8
          description: Nouveau mot de passe
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
          description: Confirmation du nouveau mot de passe
      required:
      - current_password
      - new_password
      - new_password_confirm
    AdminCheckout:
      type: object
      description: Serializer for admin checkout process (create commande for a user).
      properties:
        user_id:
          type: integer
          description: ID de l'utilisateur pour lequel créer la commande
        produits:
          type: array
          items:
            $ref: '#/components/schemas/AdminCheckoutProduit'
        moyen_paiement_id:
          type: integer
        code_promo:
          type: string
          nullable: true
        collecte:
          $ref: '#/components/schemas/AdminCheckoutCollecte'
      required:
      - collecte
      - moyen_paiement_id
      - produits
      - user_id
    AdminCheckoutCollecte:
      type: object
      description: Serializer for collecte information during admin checkout.
      properties:
        adresse:
          type: string
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,7})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,7})?$
          nullable: true
        telephone:
          type: string
          maxLength: 20
        date:
          type: string
          format: date
        creneau:
          type: string
          maxLength: 50
        note:
          type: string
      required:
      - adresse
      - creneau
      - date
      - telephone
    AdminCheckoutCollecteRequest:
      type: object
      description: Serializer for collecte information during admin checkout.
      properties:
        adresse:
          type: string
          minLength: 1
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,7})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,7})?$
          nullable: true
        telephone:
          type: string
          minLength: 1
          maxLength: 20
        date:
          type: string
          format: date
        creneau:
          type: string
          minLength: 1
          maxLength: 50
        note:
